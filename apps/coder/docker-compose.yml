services:
  coder:
    image: ghcr.io/coder/coder:latest
    container_name: coder
    restart: always
    ports:
      - 3000:3000
    environment:
      - CODER_ACCESS_URL=https://coder.oci.is-savvy.dev
      - CODER_PG_CONNECTION_URL=postgresql://coder:coder@db:5432/coder?sslmode=disable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks:
      - coder

  db:
    image: postgres:16
    container_name: coder_db
    restart: always
    environment:
      - POSTGRES_USER=coder
      - POSTGRES_PASSWORD=coder
      - POSTGRES_DB=coder
    volumes:
      - coder_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder -d coder"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - coder

volumes:
  coder_db:

networks:
  coder:
    driver: bridge
