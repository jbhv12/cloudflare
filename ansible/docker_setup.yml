- hosts: all
  become: yes
  vars:
    manager_host: "{{ groups['all'][0] }}"

  pre_tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

    - name: Enable OL9 addons repository (best effort)
      ansible.builtin.command: dnf config-manager --set-enabled ol9_addons
      register: enable_addons
      changed_when: enable_addons.rc == 0
      failed_when: false
      when: ansible_distribution == 'OracleLinux' and (ansible_distribution_major_version | int) >= 9

  tasks:
    - name: Install prerequisites for Docker
      ansible.builtin.dnf:
        name:
          - dnf-plugins-core
        state: present
        update_cache: yes
        lock_timeout: 120
      async: 600
      poll: 10

    - name: Configure Docker CE repository
      ansible.builtin.yum_repository:
        name: docker-ce-stable
        description: Docker CE Stable - $releasever - $basearch
        baseurl: https://download.docker.com/linux/centos/$releasever/$basearch/stable
        enabled: yes
        gpgcheck: yes
        gpgkey: https://download.docker.com/linux/centos/gpg
        module_hotfixes: yes

    - name: Install Docker Engine, CLI, and plugins
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest
        allowerasing: yes
        update_cache: yes
        lock_timeout: 300
        nobest: yes
      async: 1200
      poll: 15

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add opc user to docker group
      ansible.builtin.user:
        name: opc
        groups: docker
        append: yes

    - name: Verify Docker installation
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - ansible.builtin.debug:
        var: docker_version.stdout