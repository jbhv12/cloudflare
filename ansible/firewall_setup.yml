- name: Configure firewall for Ubuntu
  hosts: all
  become: yes
  tasks:
    - name: Install ufw
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: yes

    - name: Remove OCI default iptables REJECT rule
      ansible.builtin.shell: |
        iptables -L INPUT --line-numbers -n | grep 'REJECT.*icmp-host-prohibited' | awk '{print $1}' | sort -rn | while read num; do
          iptables -D INPUT "$num"
        done
      changed_when: false

    - name: Allow SSH
      ansible.builtin.command: ufw allow 22/tcp

    - name: Allow HTTP
      ansible.builtin.command: ufw allow 80/tcp

    - name: Allow NPM Admin
      ansible.builtin.command: ufw allow 81/tcp

    - name: Allow NPM Admin 2
      ansible.builtin.command: ufw allow 82/tcp

    - name: Allow HTTPS
      ansible.builtin.command: ufw allow 443/tcp

    - name: Set default deny incoming
      ansible.builtin.command: ufw default deny incoming

    - name: Set default allow outgoing
      ansible.builtin.command: ufw default allow outgoing

    - name: Enable ufw
      ansible.builtin.command: ufw --force enable
